name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to verify and package
        required: true
        default: main
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-release:
    name: Verify release inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          install: true
          cache: true

      - name: Validate release notes and changelog
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: ./scripts/validate-release-docs.sh "${GITHUB_REF_NAME}"

      - name: Run repository checks
        run: make check

  package-release:
    name: Package release assets
    runs-on: ubuntu-latest
    needs:
      - verify-release
    permissions:
      attestations: write
      contents: read
      id-token: write
    outputs:
      assets_json: ${{ steps.meta.outputs.assets_json }}
      archive: ${{ steps.meta.outputs.archive }}
      checksum: ${{ steps.meta.outputs.checksum }}
      installer: ${{ steps.meta.outputs.installer }}
      sbom: ${{ steps.meta.outputs.sbom }}
      skill: ${{ steps.meta.outputs.skill }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare release metadata
        id: meta
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          mkdir -p dist
          revision="$(git rev-parse HEAD)"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            ref_name="${INPUT_REF:-${GITHUB_REF_NAME}}"
            ref_name="${ref_name//\//-}"
            version="snapshot-${ref_name}-${revision::7}"
          fi

          asset_version="${version#v}"
          archive="openplanner_${asset_version}_source.tar.gz"
          skill="openplanner_${asset_version}_skill.tar.gz"
          checksum="openplanner_${asset_version}_checksums.txt"
          sbom="openplanner_${asset_version}_sbom.spdx.json"
          installer="install.sh"
          assets_json="$(printf '%s\n' \
            "${installer}" \
            "${checksum}" \
            "openplanner_${asset_version}_darwin_amd64.tar.gz" \
            "openplanner_${asset_version}_darwin_arm64.tar.gz" \
            "openplanner_${asset_version}_linux_amd64.tar.gz" \
            "openplanner_${asset_version}_linux_arm64.tar.gz" \
            "${sbom}" \
            "${skill}" \
            "${archive}" \
            | jq -R . | jq -cs .)"

          {
            echo "archive=${archive}"
            echo "asset_version=${asset_version}"
            echo "checksum=${checksum}"
            echo "installer=${installer}"
            echo "revision=${revision}"
            echo "sbom=${sbom}"
            echo "skill=${skill}"
            echo "version=${version}"
            echo "assets_json=${assets_json}"
          } >> "${GITHUB_OUTPUT}"

      - name: Generate release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: spdx-json
          output-file: dist/${{ steps.meta.outputs.sbom }}
          artifact-name: ${{ steps.meta.outputs.sbom }}

      - name: Build binary and skill archives
        env:
          ASSET_VERSION: ${{ steps.meta.outputs.asset_version }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          targets=(
            "darwin/arm64"
            "darwin/amd64"
            "linux/amd64"
            "linux/arm64"
          )

          for target in "${targets[@]}"; do
            IFS=/ read -r os arch <<< "${target}"
            name="openplanner_${ASSET_VERSION}_${os}_${arch}"
            mkdir -p "dist/${name}"
            GOOS="${os}" GOARCH="${arch}" go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "dist/${name}/openplanner" ./cmd/openplanner
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            rm -rf "dist/${name}"
          done

          tar -czf "dist/${{ steps.meta.outputs.skill }}" -C skills/openplanner SKILL.md

      - name: Build installer
        run: |
          sed "s/__OPENPLANNER_VERSION__/${{ steps.meta.outputs.version }}/g" scripts/install.sh > "dist/${{ steps.meta.outputs.installer }}"
          chmod 755 "dist/${{ steps.meta.outputs.installer }}"

      - name: Build source archive and checksums
        run: |
          asset_version="${{ steps.meta.outputs.asset_version }}"
          git archive --format=tar.gz --prefix="openplanner_${asset_version}/" -o "dist/${{ steps.meta.outputs.archive }}" "${{ steps.meta.outputs.revision }}"
          (
            cd dist
            shasum -a 256 *.tar.gz "${{ steps.meta.outputs.sbom }}" "${{ steps.meta.outputs.installer }}" > "${{ steps.meta.outputs.checksum }}"
          )

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-assets
          path: dist/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: |
            dist/*

      - name: Attest SBOM
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34
        with:
          subject-path: dist/${{ steps.meta.outputs.archive }}
          sbom-path: dist/${{ steps.meta.outputs.sbom }}

  publish-release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - package-release
    environment:
      name: release
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: dist

      - name: Create draft GitHub Release from tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="docs/release-notes/${GITHUB_REF_NAME}.md"
          release_json="$(gh release view "${GITHUB_REF_NAME}" --json isDraft 2>/dev/null || true)"
          if [ -n "${release_json}" ]; then
            is_draft="$(printf '%s\n' "${release_json}" | jq -r '.isDraft')"
            if [ "${is_draft}" != "true" ]; then
              echo "Release ${GITHUB_REF_NAME} already exists and is not a draft; refusing to mutate a published release." >&2
              exit 1
            fi
            echo "Release already exists for ${GITHUB_REF_NAME}"
            gh release edit "${GITHUB_REF_NAME}" --notes-file "${notes_file}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --draft \
              --verify-tag \
              --notes-file "${notes_file}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/* \
            --clobber

      - name: Verify draft GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_ASSETS: ${{ needs.package-release.outputs.assets_json }}
        run: |
          release_json="$(gh release view "${GITHUB_REF_NAME}" --json isDraft,assets)"
          is_draft="$(printf '%s\n' "${release_json}" | jq -r '.isDraft')"
          [ "${is_draft}" = "true" ] || { echo "Release ${GITHUB_REF_NAME} is not draft before publish" >&2; exit 1; }

          actual_assets="$(printf '%s\n' "${release_json}" | jq -c '[.assets[].name] | sort')"
          expected_assets="$(printf '%s\n' "${EXPECTED_ASSETS}" | jq -c 'sort')"
          [ "${actual_assets}" = "${expected_assets}" ] || {
            echo "Draft release assets do not match expected set" >&2
            echo "expected: ${expected_assets}" >&2
            echo "actual:   ${actual_assets}" >&2
            exit 1
          }

      - name: Publish draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --latest

      - name: Verify published GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_json="$(gh release view "${GITHUB_REF_NAME}" --json isDraft,isPrerelease)"
          is_draft="$(printf '%s\n' "${release_json}" | jq -r '.isDraft')"
          is_prerelease="$(printf '%s\n' "${release_json}" | jq -r '.isPrerelease')"
          [ "${is_draft}" = "false" ] || { echo "Release ${GITHUB_REF_NAME} is still draft" >&2; exit 1; }
          [ "${is_prerelease}" = "false" ] || { echo "Release ${GITHUB_REF_NAME} is prerelease" >&2; exit 1; }

          latest_tag="$(gh release view --json tagName --jq '.tagName')"
          [ "${latest_tag}" = "${GITHUB_REF_NAME}" ] || { echo "Latest release is ${latest_tag}, expected ${GITHUB_REF_NAME}" >&2; exit 1; }
